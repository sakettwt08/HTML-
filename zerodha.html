<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .navbar{
            display:flex;
            justify-content:space-between;
            padding-left: 350px;
            padding-top:10px;
            padding-bottom:10px;
            padding-right:350px;
            text-align:center;
            border:thin 0.5px grey;
            box-shadow:2px 1px 2px #eee;


        }
        .sidebar{
            display: flex;
            gap: 25px;
            justify-content:space-evenly;
           padding:20px;
            color:#666;
            cursor:pointer;
        }
        .ele:hover{
            cursor:pointer;
        }
        .ele{
            text-align:center;
        }
        .page{
            display:flex;
            padding-top:75px;
            justify-content:center;
        
        }
        .bottompart{
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
        } 
        .but{
            background-color:#387ed1;
            color:white;
            font-size:20px;
            padding:10px 30px 10px 30px;
        }
        .txt{
            text-align:center;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <img src="/logo.svg" alt="It is not working"  width="100px" height="15px"style="padding-top:15px ;"/>

        <div class="sidebar">
            <div class="ele">Signup</div>
              <div class="ele">About</div>
            <div class="ele">Products</div>
            <div class="ele">Pricing</div>
            <div class="ele">Support</div>
        </div>
        </div>
        
        <div class="page">
            <img src="/landing.svg" alt="">
        </div>
        <div class="bottompart">
            <h1 style="font-weight:500; font-size:1.5rem">Invest in everything</h1>
            <p style="font-weight:200; font-size:20px ;color:grey">Online platform to invest in stocks, derivatives, mutual funds, ETFs, bonds, and more.</p>
    </div class="txt">
   <div style=" display:flex ; justify-content:center ; margin-top:20px">
    <div class="but">Sign up now</div>
   </div>
    
</body>
</html>
